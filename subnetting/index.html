<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Packet Tracer</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #060a12;
    --surface:  #090e1a;
    --border:   #142036;
    --cyan:     #00d4ff;
    --green:    #00ff88;
    --gold:     #ffc740;
    --purple:   #9b6dff;
    --red:      #ff4a6e;
    --text:     #7a9dbe;
    --muted:    #2e4a68;
    --cable:    #172840;
    --a-color:  #7878ff;
    --b-color:  #00aaff;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 212, 255, 0.015) 2px,
      rgba(0, 212, 255, 0.015) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  header {
    width: 100%;
    max-width: 960px;
    padding: 18px 20px 10px;
    display: flex;
    align-items: baseline;
    gap: 14px;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 1.05rem;
    color: var(--cyan);
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  header .subtitle {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
    margin-left: auto;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  #diagram-wrap {
    width: 100%;
    max-width: 960px;
    padding: 10px 10px 0;
  }

  svg {
    width: 100%;
    height: auto;
    display: block;
    overflow: visible;
  }

  /* SVG device hover/select styles */
  .device-node { cursor: pointer; }
  .device-node .dev-body { transition: stroke 0.15s; }
  .device-node:hover .dev-body { stroke: rgba(150,150,255,0.7); stroke-width: 2; }
  .device-node.selected .dev-body { stroke: var(--cyan) !important; stroke-width: 2.5 !important; }
  .device-node.selected .dev-header { fill: #0a2540 !important; }

  /* Log section */
  #log-section {
    width: 100%;
    max-width: 960px;
    padding: 10px 10px 24px;
  }

  .log-header {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 5px;
    padding-left: 2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .log-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  #log {
    background: #040710;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    height: 155px;
    overflow-y: auto;
    font-size: 0.7rem;
    line-height: 1.75;
    scrollbar-width: thin;
    scrollbar-color: var(--muted) transparent;
  }

  #log::-webkit-scrollbar { width: 4px; }
  #log::-webkit-scrollbar-track { background: transparent; }
  #log::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 4px; }

  .log-entry { display: flex; gap: 8px; }
  .log-ts    { color: var(--muted); flex-shrink: 0; }
  .log-src   { color: var(--gold); }
  .log-hop   { color: var(--cyan); }
  .log-same  { color: var(--green); }
  .log-diff  { color: var(--red); }
  .log-info  { color: var(--text); }
  .log-done  { color: var(--green); }

  #hint {
    font-size: 0.68rem;
    color: var(--muted);
    text-align: center;
    padding: 6px 0 4px;
    letter-spacing: 0.06em;
  }

  #hint span { color: var(--cyan); }
</style>
</head>

<svg viewBox="0 0 920 510" xmlns="http://www.w3.org/2000/svg" id="net-svg">
<defs>
  <!-- Subtle grid -->
  <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
    <path d="M28 0L0 0 0 28" fill="none" stroke="#0c1424" stroke-width="0.6"/>
  </pattern>

  <!-- Glows -->
  <filter id="glow-c" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-g" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-pkt" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur stdDeviation="8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-pkt-inner" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Cable active gradient -->
  <linearGradient id="cable-lit" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#00d4ff" stop-opacity="0.3"/>
    <stop offset="50%"  stop-color="#00d4ff"/>
    <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.3"/>
  </linearGradient>
</defs>

  <text x="750" y="438" fill="#0e2040" font-family="Share Tech Mono" font-size="8.5">Firmware 3.4.1</text>
  <circle cx="846" cy="353" r="4" fill="#0a1e3a" stroke="#0e3560" stroke-width="1"/>
  <circle cx="846" cy="353" r="2" fill="#0050a0" opacity="0.7"/>
  <polyline points="708,342 708,352 718,342" fill="#00aaff" opacity="0.4"/>
  <polyline points="862,342 862,352 852,342" fill="#00aaff" opacity="0.4"/>
</g>


<!-- =====================================================================
     PACKET (animated dot — starts hidden)
     ===================================================================== -->
<circle id="pkt-glow"  r="12" fill="#ff4a6e" opacity="0" filter="url(#glow-pkt)"/>
<circle id="pkt-outer" r="7"  fill="#ff6a40" opacity="0" filter="url(#glow-pkt-inner)"/>
<circle id="pkt-inner" r="3.5" fill="#ffffff" opacity="0"/>

</svg>
</div>

<div id="hint">Click a <span>SOURCE</span> device, then a <span>DESTINATION</span> device to trace the packet</div>

<div id="log-section">
  <div class="log-header">Packet Trace Log</div>
  <div id="log"></div>
</div>

<script>
// ─── Cable path map ────────────────────────────────────────────────────────────
// 'sp1', 'sp2', 'sl1', 'sp3' match data-cable on device nodes
// 'rs'  = router↔switch link
// Paths are defined so start=switch-end, finish=device-end
// (or start=router-end, finish=switch-end for rs)
const CABLE_IDS = {
  rs:  { base: 'c-rs',  active: 'a-rs'  },
  sp1: { base: 'c-sp1', active: 'a-sp1' },
  sp2: { base: 'c-sp2', active: 'a-sp2' },
  sl1: { base: 'c-sl1', active: 'a-sl1' },
  sp3: { base: 'c-sp3', active: 'a-sp3' },
};

// ─── State ────────────────────────────────────────────────────────────────────
let selectedNode = null;
let animating    = false;
let logSeq       = 0;

// ─── DOM refs ──────────────────────────────────────────────────────────────────
const pktGlow  = document.getElementById('pkt-glow');
const pktOuter = document.getElementById('pkt-outer');
const pktInner = document.getElementById('pkt-inner');
const logEl    = document.getElementById('log');

// ─── Helpers ──────────────────────────────────────────────────────────────────
function ts() {
  const n = new Date();
  return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
}

function writeLog(cls, msg) {
  logSeq++;
  const div = document.createElement('div');
  div.className = 'log-entry';
  div.innerHTML = `<span class="log-ts">[${ts()}]</span><span class="log-${cls}">${msg}</span>`;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
}

function setPacketPos(x, y) {
  [pktGlow, pktOuter, pktInner].forEach(el => {
    el.setAttribute('cx', x);
    el.setAttribute('cy', y);
  });
}

function showPacket(v) {
  const o = v ? '1' : '0';
  pktGlow.setAttribute('opacity', v ? '0.6' : '0');
  pktOuter.setAttribute('opacity', o);
  pktInner.setAttribute('opacity', o);
}

// ease-in-out cubic
function easeInOut(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
}

// ─── Animation ────────────────────────────────────────────────────────────────
// Animate packet along a path element
// reverse=true  → travels from end→start of path
// duration in ms
function animatePath(cableKey, reverse, duration) {
  return new Promise(resolve => {
    const ids   = CABLE_IDS[cableKey];
    const path  = document.getElementById(ids.base);
    const aPath = document.getElementById(ids.active);
    const len   = path.getTotalLength();

    // Light up the active cable
    aPath.setAttribute('opacity', '1');

    const t0 = performance.now();

    function frame(now) {
      let frac = Math.min((now - t0) / duration, 1);
      frac = easeInOut(frac);

      const dist = reverse ? len * (1 - frac) : len * frac;
      const pt   = path.getPointAtLength(dist);
      setPacketPos(pt.x, pt.y);

      if ((now - t0) < duration) {
        requestAnimationFrame(frame);
      } else {
        aPath.setAttribute('opacity', '0');
        resolve();
      }
    }
    requestAnimationFrame(frame);
  });
}

// ─── Simulate ─────────────────────────────────────────────────────────────────
async function simulate(srcEl, dstEl) {
  if (animating) return;
  animating = true;

  const srcIP     = srcEl.dataset.ip;
  const dstIP     = dstEl.dataset.ip;
  const srcMAC    = srcEl.dataset.mac;
  const dstMAC    = dstEl.dataset.mac;
  const srcSubnet = srcEl.dataset.subnet;
  const dstSubnet = dstEl.dataset.subnet;
  const srcCable  = srcEl.dataset.cable;
  const dstCable  = dstEl.dataset.cable;
  const sameSubnet = (srcSubnet === dstSubnet);

  // ── Header log ──
  writeLog('src', `━━ NEW FRAME  ${srcIP} (${srcMAC})  ──▶  ${dstIP} (${dstMAC})`);

  if (sameSubnet) {
    writeLog('same', `✔  Same subnet (${srcSubnet}) — L2 switch forwarding only`);
  } else {
    writeLog('diff', `✘  Different subnets (${srcSubnet} → ${dstSubnet}) — L3 routing required`);
  }

  // Show packet
  showPacket(true);

  if (sameSubnet) {
    // ── HOP 1: src → switch ──
    writeLog('hop', `HOP 1  ${srcIP} ──▶  Switch  [L2 frame, dst MAC: ${dstMAC}]`);
    // Device cables are defined switch→device, so to go device→switch we reverse
    await animatePath(srcCable, true,  550);

    // ── HOP 2: switch → dst ──
    writeLog('hop', `HOP 2  Switch ──▶  ${dstIP}  [CAM table lookup hit]`);
    await animatePath(dstCable, false, 550);

  } else {
    // ── HOP 1: src → switch ──
    writeLog('hop', `HOP 1  ${srcIP} ──▶  Switch  [dst MAC: FF:FF:00:00:00:01 (Router GW)]`);
    await animatePath(srcCable, true,  480);

    // ── HOP 2: switch → router ──
    // Router-switch path is defined router→switch, so switch→router = reverse
    writeLog('hop', `HOP 2  Switch ──▶  Router  [ARP: who has ${srcIP.split('.').slice(0,3).join('.')}.1?]`);
    await animatePath('rs', true,  360);

    // ── HOP 3: router → switch ──
    writeLog('hop', `HOP 3  Router ──▶  Switch  [route: ${dstIP} via ${dstIP.split('.').slice(0,3).join('.')}.1, new dst MAC: ${dstMAC}]`);
    await animatePath('rs', false, 360);

    // ── HOP 4: switch → dst ──
    writeLog('hop', `HOP 4  Switch ──▶  ${dstIP}  [CAM table lookup, L2 delivery]`);
    await animatePath(dstCable, false, 480);
  }

  writeLog('done', `✓  Delivered  ·  ${sameSubnet ? '2 hops (L2)' : '4 hops (L3)'}  ·  ${sameSubnet ? 'No NAT' : 'Routed'}`);

  showPacket(false);
  animating = false;
}

// ─── Click handlers ────────────────────────────────────────────────────────────
document.querySelectorAll('.device-node').forEach(node => {
  node.addEventListener('click', () => {
    if (animating) return;

    if (!selectedNode) {
      // Select as source
      selectedNode = node;
      node.classList.add('selected');
      writeLog('src', `SOURCE selected: ${node.dataset.ip}  (${node.dataset.mac})`);

    } else if (selectedNode === node) {
      // Deselect
      selectedNode.classList.remove('selected');
      selectedNode = null;
      writeLog('info', 'Selection cleared.');

    } else {
      // Run simulation
      const src = selectedNode;
      src.classList.remove('selected');
      selectedNode = null;
      simulate(src, node);
    }
  });
});

// ─── Initial log message ──────────────────────────────────────────────────────
writeLog('info', 'System ready.  Click any device to begin packet trace.');
</script>

</body>
</html>
