<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editorial / data.json</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-dark: #09090b;
      --bg-panel: rgba(24, 24, 27, 0.6);
      --border: rgba(255, 255, 255, 0.1);
      --border-hover: rgba(255, 255, 255, 0.2);
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.5);
      --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --success: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-dark);
      background-image:
        radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
      background-attachment: fixed;
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      height: 70px;
      background: rgba(9, 9, 11, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      z-index: 10;
    }

    .brand {
      font-size: 24px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .brand span {
      font-weight: 400;
      color: var(--text-muted);
      -webkit-text-fill-color: var(--text-muted);
      font-size: 18px;
    }

    .actions {
      display: flex;
      gap: 16px;
    }

    button {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--border-hover);
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    button.primary {
      background: var(--accent-gradient);
      border: none;
      color: white;
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    button.primary:hover:not(:disabled) {
      box-shadow: 0 6px 16px var(--accent-glow);
      transform: translateY(-2px);
    }

    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
      padding: 24px;
      gap: 24px;
    }

    .glass-panel {
      background: var(--bg-panel);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    #sidebar {
      width: 320px;
      flex-shrink: 0;
    }

    .search-bar {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .search-bar input {
      width: 100%;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 12px 16px;
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }

    .search-bar input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }

    #entry-list {
      flex: 1;
      overflow-y: auto;
      list-style: none;
      padding: 12px;
    }

    #entry-list::-webkit-scrollbar {
      width: 6px;
    }

    #entry-list::-webkit-scrollbar-track {
      background: transparent;
    }

    #entry-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    #entry-list::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .entry-item {
      padding: 14px 16px;
      border-radius: 8px;
      margin-bottom: 4px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.2s;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .entry-item:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
    }

    .entry-item.active {
      background: rgba(59, 130, 246, 0.15);
      color: var(--accent);
      border-left: 3px solid var(--accent);
    }

    #editor-pane {
      flex: 1;
    }

    .pane-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0, 0, 0, 0.2);
    }

    .pane-title {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .pane-title .badge {
      font-size: 12px;
      background: rgba(255, 255, 255, 0.1);
      padding: 4px 10px;
      border-radius: 100px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .editor-workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .code-area,
    .preview-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .code-area {
      border-right: 1px solid var(--border);
    }

    .area-title {
      padding: 12px 24px;
      font-size: 12px;
      font-family: 'Fira Code', monospace;
      text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      letter-spacing: 1px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    textarea {
      flex: 1;
      background: transparent;
      color: #60a5fa;
      padding: 24px;
      border: none;
      resize: none;
      outline: none;
      font-family: 'Fira Code', monospace;
      font-size: 14px;
      line-height: 1.6;
    }

    textarea::-webkit-scrollbar {
      width: 8px;
    }

    textarea::-webkit-scrollbar-track {
      background: transparent;
    }

    textarea::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .preview-content {
      flex: 1;
      padding: 32px;
      overflow-y: auto;
      background: #0b0f1a;
      /* Match the main site bg */
      color: #cdd6f4;
      font-family: 'IBM Plex Sans', sans-serif;
    }

    /* Styles specifically for previewing Messer content */
    .preview-content .kb-entry h4 {
      font-family: 'Barlow Condensed', sans-serif;
      color: #00c8ff;
      font-size: 18px;
      margin-top: 16px;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .preview-content .kb-entry h4:first-child {
      margin-top: 0;
    }

    .preview-content .kb-entry p {
      margin-bottom: 12px;
      line-height: 1.6;
      font-size: 14px;
    }

    .preview-content .kb-entry ul {
      list-style: none;
      margin-bottom: 16px;
      padding-left: 0;
    }

    .preview-content .kb-entry ul li {
      position: relative;
      padding-left: 18px;
      margin-bottom: 6px;
      font-size: 14px;
      line-height: 1.6;
    }

    .preview-content .kb-entry ul li::before {
      content: '•';
      position: absolute;
      left: 0;
      color: #0084a8;
      font-size: 14px;
    }

    .preview-content .kb-entry strong {
      color: #e8eaf6;
    }

    .preview-content .kb-entry em {
      color: #3b82f6;
      font-style: normal;
    }

    .preview-content .kb-tip {
      background: #00c8ff15;
      border-left: 4px solid #00c8ff;
      padding: 12px 16px;
      border-radius: 6px;
      margin-top: 16px;
      font-size: 14px;
    }

    /* Status toast */
    #toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: var(--success);
      color: white;
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: none;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* SVG Icons */
    svg {
      width: 18px;
      height: 18px;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      text-align: center;
      padding: 40px;
    }

    .empty-state svg {
      width: 48px;
      height: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state h3 {
      color: var(--text-main);
      font-size: 20px;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .empty-state p {
      font-size: 14px;
      max-width: 300px;
      line-height: 1.5;
    }

    /* Rename Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 400px;
      padding: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      transform: scale(0.95);
      transition: transform 0.2s;
    }

    .modal-overlay.active .modal {
      transform: scale(1);
    }

    .modal h3 {
      margin-bottom: 16px;
      font-size: 18px;
    }

    .modal input {
      width: 100%;
      padding: 12px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      color: white;
      border-radius: 8px;
      outline: none;
      margin-bottom: 24px;
      font-family: 'Outfit';
      font-size: 15px;
    }

    .modal input:focus {
      border-color: var(--accent);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }
  </style>
</head>

<body>

  <header>
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M12 20h9"></path>
        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
      </svg>
      Editorial <span>/ data.json</span>
    </div>
    <div class="actions">
      <button onclick="openFile()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
        </svg>
        Open Workspace
      </button>
      <button class="primary" onclick="saveFile()" id="save-btn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
          <polyline points="17 21 17 13 7 13 7 21"></polyline>
          <polyline points="7 3 7 8 15 8"></polyline>
        </svg>
        Save to Disk
      </button>
    </div>
  </header>

  <div id="main">
    <div id="sidebar" class="glass-panel">
      <div class="search-bar">
        <input type="text" id="search" placeholder="Search entries..." oninput="filterEntries()" disabled>
      </div>
      <ul id="entry-list">
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
            <polyline points="13 2 13 9 20 9"></polyline>
          </svg>
          <h3>No File Loaded</h3>
          <p>Open the data.json file from your project to start editing.</p>
        </div>
      </ul>
    </div>

    <div id="editor-pane" class="glass-panel">
      <div class="pane-header">
        <div class="pane-title">
          <span id="current-key">Workspace</span>
          <span class="badge" id="entry-count" style="display:none">0 Entries</span>
        </div>
        <div style="display:flex; gap:12px;">
          <button onclick="renameCurrentEntry()" id="rename-btn" style="display:none;">Rename</button>
          <button onclick="deleteCurrentEntry()" id="delete-btn"
            style="display:none; color:#ef4444; border-color:rgba(239,68,68,0.2)">Delete</button>
          <button class="primary" onclick="addNewEntry()" id="add-btn" disabled>+ Add Entry</button>
        </div>
      </div>
      <div class="editor-workspace">
        <div class="code-area">
          <div class="area-title">
            <span>HTML Source</span>
            <span style="opacity:0.5">&lt;/&gt;</span>
          </div>
          <textarea id="html-input" disabled oninput="updatePreview()"
            placeholder="Select an entry to edit its HTML content..."></textarea>
        </div>
        <div class="preview-area">
          <div class="area-title">
            <span>Live Preview</span>
            <span style="opacity:0.5">👁️</span>
          </div>
          <div class="preview-content" id="preview-output">
            <div class="empty-state" style="height: 100%; opacity: 0.5;">
              Preview will appear here
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="20 6 9 17 4 12"></polyline>
    </svg>
    <span id="toast-msg">Saved successfully!</span>
  </div>

  <div class="modal-overlay" id="rename-modal">
    <div class="modal">
      <h3 id="modal-title">Rename Entry</h3>
      <input type="text" id="rename-input" placeholder="Entry name...">
      <div class="modal-actions">
        <button onclick="closeModal()">Cancel</button>
        <button class="primary" onclick="confirmRename()">Save</button>
      </div>
    </div>
  </div>

  <script>
    let fileHandle = null;
    let jsonData = {};
    let currentSelectedKey = null;
    let modalAction = null; // 'rename' or 'add'

    async function openFile() {
      try {
        if (!window.showOpenFilePicker) {
          alert("Your browser does not support the File System Access API. Please use a recent version of Chrome, Edge, or Opera.");
          return;
        }

        [fileHandle] = await window.showOpenFilePicker({
          types: [{ description: 'JSON Files', accept: { 'application/json': ['.json'] } }]
        });
        const file = await fileHandle.getFile();
        const contents = await file.text();
        jsonData = JSON.parse(contents);

        document.getElementById('save-btn').disabled = false;
        document.getElementById('add-btn').disabled = false;
        document.getElementById('search').disabled = false;
        document.getElementById('entry-count').style.display = 'inline-block';

        renderList();
        // showToast(`Loaded ${Object.keys(jsonData).length} entries.`);

        const keys = Object.keys(jsonData);
        if (keys.length > 0) {
          selectEntry(keys[0]);
        }
      } catch (err) {
        if (err.name !== 'AbortError') {
          console.error(err);
          alert('Error opening file: ' + err.message);
        }
      }
    }

    async function saveFile() {
      if (!fileHandle) return;
      saveCurrentEditor();

      try {
        const writable = await fileHandle.createWritable();
        await writable.write(JSON.stringify(jsonData, null, 2));
        await writable.close();
        showToast('Saved to disk successfully!');
      } catch (err) {
        console.error(err);
        alert('Error saving file. You may need to grant write permissions.');
      }
    }

    function renderList(filterText = '') {
      const list = document.getElementById('entry-list');
      list.innerHTML = '';

      const keys = Object.keys(jsonData);
      document.getElementById('entry-count').textContent = `${keys.length} Entries`;

      const filtered = keys.filter(k => k.toLowerCase().includes(filterText.toLowerCase()));

      if (keys.length === 0) {
        list.innerHTML = '<div class="empty-state" style="padding:20px"><p>No entries found. Add one!</p></div>';
        return;
      }

      if (filtered.length === 0) {
        list.innerHTML = '<div style="padding: 16px; color: var(--text-muted); text-align: center; font-size: 14px;">No results found.</div>';
        return;
      }

      filtered.forEach(key => {
        const li = document.createElement('li');
        li.className = 'entry-item';
        if (key === currentSelectedKey) li.classList.add('active');

        let displayName = key.length > 30 ? key.substring(0, 27) + '...' : key;

        li.innerHTML = `<span>${displayName}</span>`;
        li.onclick = () => selectEntry(key);
        list.appendChild(li);
      });
    }

    function filterEntries() {
      const text = document.getElementById('search').value;
      renderList(text);
    }

    function selectEntry(key) {
      saveCurrentEditor();
      currentSelectedKey = key;
      renderList(document.getElementById('search').value);

      document.getElementById('current-key').textContent = key;
      document.getElementById('rename-btn').style.display = 'block';
      document.getElementById('delete-btn').style.display = 'block';

      const textarea = document.getElementById('html-input');
      textarea.disabled = false;
      textarea.value = jsonData[key] || '';
      updatePreview();
    }

    function saveCurrentEditor() {
      if (currentSelectedKey && jsonData.hasOwnProperty(currentSelectedKey)) {
        const textarea = document.getElementById('html-input');
        jsonData[currentSelectedKey] = textarea.value;
      }
    }

    function updatePreview() {
      const html = document.getElementById('html-input').value;
      document.getElementById('preview-output').innerHTML = html || '<div class="empty-state" style="height: 100%; opacity: 0.5;">Empty content</div>';
    }

    function addNewEntry() {
      modalAction = 'add';
      document.getElementById('modal-title').textContent = 'New Entry Title';
      document.getElementById('rename-input').value = '';
      document.getElementById('rename-modal').classList.add('active');
      document.getElementById('rename-input').focus();
    }

    function renameCurrentEntry() {
      if (!currentSelectedKey) return;
      modalAction = 'rename';
      document.getElementById('modal-title').textContent = 'Rename Entry';
      document.getElementById('rename-input').value = currentSelectedKey;
      document.getElementById('rename-modal').classList.add('active');
      document.getElementById('rename-input').focus();
    }

    function confirmRename() {
      const newName = document.getElementById('rename-input').value.trim();
      if (!newName) return;

      if (jsonData.hasOwnProperty(newName) && newName !== currentSelectedKey) {
        alert('An entry with this name already exists!');
        return;
      }

      if (modalAction === 'rename') {
        saveCurrentEditor();
        const content = jsonData[currentSelectedKey];
        delete jsonData[currentSelectedKey];
        jsonData[newName] = content;
        currentSelectedKey = newName;
        showToast('Entry renamed.');
      } else if (modalAction === 'add') {
        jsonData[newName] = "\\n<div class='kb-entry'>\\n  <h4>Preface</h4>\\n  <p>New content here...</p>\\n</div>\\n";
        currentSelectedKey = newName;
        document.getElementById('search').value = '';
        showToast('New entry created.');
      }

      closeModal();
      renderList();
      selectEntry(currentSelectedKey);

      setTimeout(() => {
        const activeItem = document.querySelector('.entry-item.active');
        if (activeItem) activeItem.scrollIntoView({ block: 'center' });
      }, 100);
    }

    function deleteCurrentEntry() {
      if (!currentSelectedKey) return;
      if (confirm(`Are you sure you want to delete "${currentSelectedKey}"?`)) {
        delete jsonData[currentSelectedKey];
        currentSelectedKey = null;

        document.getElementById('current-key').textContent = 'Workspace';
        document.getElementById('rename-btn').style.display = 'none';
        document.getElementById('delete-btn').style.display = 'none';

        const textarea = document.getElementById('html-input');
        textarea.value = '';
        textarea.disabled = true;
        document.getElementById('preview-output').innerHTML = '<div class="empty-state" style="height: 100%; opacity: 0.5;">Select an entry</div>';

        renderList();
        showToast('Entry deleted.');
      }
    }

    function closeModal() {
      document.getElementById('rename-modal').classList.remove('active');
    }

    document.getElementById('rename-input').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') confirmRename();
    });
  </script>
</body>

</html>
