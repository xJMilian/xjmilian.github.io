<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Editor / quiz.json</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #09090b;
      --bg-panel: rgba(24, 24, 27, 0.6);
      --border: rgba(255, 255, 255, 0.1);
      --border-hover: rgba(255, 255, 255, 0.2);
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.5);
      --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --success: #10b981;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
      background-attachment: fixed;
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      height: 70px;
      background: rgba(9, 9, 11, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      z-index: 10;
    }

    .brand {
      font-size: 24px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .brand span {
      font-weight: 400;
      color: var(--text-muted);
      -webkit-text-fill-color: var(--text-muted);
      font-size: 18px;
    }

    .actions {
      display: flex;
      gap: 16px;
    }

    button {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--border-hover);
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    button.primary {
      background: var(--accent-gradient);
      border: none;
      color: white;
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    button.primary:hover:not(:disabled) {
      box-shadow: 0 6px 16px var(--accent-glow);
      transform: translateY(-2px);
    }
    
    button.danger {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.3);
      color: var(--danger);
    }
    button.danger:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
      padding: 24px;
      gap: 24px;
    }

    .glass-panel {
      background: var(--bg-panel);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    #sidebar {
      width: 320px;
      flex-shrink: 0;
    }

    .search-bar {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .search-bar input {
      width: 100%;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 12px 16px;
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }

    .search-bar input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }

    #entry-list {
      flex: 1;
      overflow-y: auto;
      list-style: none;
      padding: 12px;
    }

    #entry-list::-webkit-scrollbar { width: 6px; }
    #entry-list::-webkit-scrollbar-track { background: transparent; }
    #entry-list::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    #entry-list::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

    .entry-item {
      padding: 14px 16px;
      border-radius: 8px;
      margin-bottom: 4px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.2s;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .entry-item:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
    }

    .entry-item.active {
      background: rgba(59, 130, 246, 0.15);
      color: var(--accent);
      border-left: 3px solid var(--accent);
    }
    
    .q-count {
      font-size: 12px;
      background: rgba(255,255,255,0.1);
      padding: 2px 6px;
      border-radius: 4px;
    }

    #editor-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .pane-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0, 0, 0, 0.2);
    }

    .pane-title {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .editor-workspace {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    
    .editor-workspace::-webkit-scrollbar { width: 8px; }
    .editor-workspace::-webkit-scrollbar-track { background: transparent; }
    .editor-workspace::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    
    /* Question Card */
    .q-card {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .q-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
      font-size: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .input-group label {
      font-size: 13px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }
    
    textarea, input[type="text"] {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 12px;
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    
    textarea:focus, input[type="text"]:focus {
      border-color: var(--accent);
    }
    
    textarea {
      resize: vertical;
      min-height: 80px;
      line-height: 1.5;
    }
    
    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: rgba(255,255,255,0.02);
      padding: 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    
    .option-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .option-row input[type="radio"] {
      width: 20px;
      height: 20px;
      accent-color: var(--success);
      cursor: pointer;
    }
    
    .option-row input[type="text"] {
      flex: 1;
    }

    /* Status toast */
    #toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: var(--success);
      color: white;
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: none;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      text-align: center;
      padding: 40px;
    }
    .empty-state h3 {
      color: var(--text-main);
      font-size: 20px;
      margin-bottom: 8px;
      font-weight: 500;
    }
    
    /* Checkbox list (for multi-select answers) */
    .multi-ans-hint {
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
      margin-top: -4px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
      QuizEdit <span>/ quiz.json</span>
    </div>
    <div class="actions">
      <button onclick="openFile()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
        Open Workspace
      </button>
      <button class="primary" onclick="saveFile()" id="save-btn" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
        Save to Disk
      </button>
    </div>
  </header>

  <div id="main">
    <div id="sidebar" class="glass-panel">
      <div class="search-bar">
        <input type="text" id="search" placeholder="Search topics..." oninput="filterEntries()" disabled>
      </div>
      <ul id="entry-list">
        <div class="empty-state">
          <h3>No File Loaded</h3>
          <p>Open the quiz.json file from your project to start editing.</p>
        </div>
      </ul>
    </div>

    <div id="editor-pane" class="glass-panel">
      <div class="pane-header">
        <div class="pane-title">
          <span id="current-key">Workspace</span>
        </div>
        <div style="display:flex; gap:12px;">
          <button class="primary" onclick="addQuestion()" id="add-btn" disabled>+ Add Question</button>
        </div>
      </div>
      <div class="editor-workspace" id="questions-container">
        <div class="empty-state" style="opacity: 0.5;">
          Select a topic from the sidebar to view questions.
        </div>
      </div>
    </div>
  </div>

  <div id="toast">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
    <span id="toast-msg">Saved successfully!</span>
  </div>

  <script>
    let fileHandle = null;
    let jsonData = {};
    let currentSelectedTopic = null;

    async function openFile() {
      try {
        if (!window.showOpenFilePicker) {
          alert("Your browser does not support the File System Access API. Please use a recent browser.");
          return;
        }

        [fileHandle] = await window.showOpenFilePicker({
          types: [{ description: 'JSON Files', accept: { 'application/json': ['.json'] } }]
        });
        const file = await fileHandle.getFile();
        const contents = await file.text();
        jsonData = JSON.parse(contents);

        document.getElementById('save-btn').disabled = false;
        document.getElementById('add-btn').disabled = false;
        document.getElementById('search').disabled = false;

        renderSidebar();

        const keys = Object.keys(jsonData);
        if (keys.length > 0) {
          selectTopic(keys[0]);
        }
      } catch (err) {
        if (err.name !== 'AbortError') {
          console.error(err);
          alert('Error opening file: ' + err.message);
        }
      }
    }

    async function saveFile() {
      if (!fileHandle) return;
      
      try {
        const writable = await fileHandle.createWritable();
        await writable.write(JSON.stringify(jsonData, null, 2));
        await writable.close();
        showToast('Saved to disk successfully!');
      } catch (err) {
        console.error(err);
        alert('Error saving file. You may need to grant write permissions.');
      }
    }

    function renderSidebar(filterText = '') {
      const list = document.getElementById('entry-list');
      list.innerHTML = '';

      const keys = Object.keys(jsonData);
      const filtered = keys.filter(k => k.toLowerCase().includes(filterText.toLowerCase()));

      if (keys.length === 0) {
        list.innerHTML = '<div class="empty-state"><p>No topics found.</p></div>';
        return;
      }

      if (filtered.length === 0) {
        list.innerHTML = '<div style="padding: 16px; color: var(--text-muted); text-align: center; font-size: 14px;">No results found.</div>';
        return;
      }

      filtered.forEach(key => {
        const li = document.createElement('li');
        li.className = 'entry-item';
        if (key === currentSelectedTopic) li.classList.add('active');

        let displayName = key.length > 30 ? key.substring(0, 27) + '...' : key;
        let count = Array.isArray(jsonData[key]) ? jsonData[key].length : 0;

        li.innerHTML = `<span>${displayName}</span><span class="q-count">${count} Qs</span>`;
        li.onclick = () => selectTopic(key);
        list.appendChild(li);
      });
    }

    function filterEntries() {
      const text = document.getElementById('search').value;
      renderSidebar(text);
    }

    function selectTopic(topic) {
      currentSelectedTopic = topic;
      renderSidebar(document.getElementById('search').value);
      document.getElementById('current-key').textContent = topic;
      
      // Ensure the topic is an array
      if (!Array.isArray(jsonData[topic])) {
          jsonData[topic] = [];
      }
      
      renderQuestions();
    }

    function renderQuestions() {
      const container = document.getElementById('questions-container');
      container.innerHTML = '';
      
      const questions = jsonData[currentSelectedTopic];
      
      if (questions.length === 0) {
          container.innerHTML = '<div class="empty-state"><p>No questions in this topic yet.</p></div>';
          return;
      }
      
      questions.forEach((q, idx) => {
          const isMulti = Array.isArray(q.answer);
          
          let optionsHtml = '';
          if (q.options && Array.isArray(q.options)) {
              q.options.forEach((opt, optIdx) => {
                  let isChecked = false;
                  if (isMulti) {
                      isChecked = q.answer.includes(optIdx);
                  } else {
                      isChecked = (q.answer === optIdx);
                  }
                  
                  // For multi-select, use checkboxes. For single, use radio.
                  const inputType = isMulti ? 'checkbox' : 'radio';
                  const nameAttr = isMulti ? `ans-${idx}-${optIdx}` : `ans-${idx}`;
                  
                  optionsHtml += `
                    <div class="option-row">
                      <input type="${inputType}" name="${nameAttr}" value="${optIdx}" ${isChecked ? 'checked' : ''} 
                             onchange="updateAnswer(${idx}, ${optIdx}, this.checked, ${isMulti})">
                      <input type="text" value="${escapeHtml(opt)}" 
                             oninput="updateOption(${idx}, ${optIdx}, this.value)">
                    </div>
                  `;
              });
          }
          
          const card = document.createElement('div');
          card.className = 'q-card';
          card.innerHTML = `
            <div class="q-card-header">
              <span>Question ${idx + 1}</span>
              <button class="danger" onclick="deleteQuestion(${idx})">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                Delete
              </button>
            </div>
            
            <div class="input-group">
              <label>Scenario / Question</label>
              <textarea oninput="updateQuestion(${idx}, 'question', this.value)">${escapeHtml(q.question || '')}</textarea>
            </div>
            
            <div class="input-group">
              <label>Options & Answer Selection</label>
              <div class="multi-ans-hint">${isMulti ? '(Multi-select question: checking multiple boxes updates the answer array)' : '(Single-select question: click radio button to select correct answer)'}</div>
              <div class="options-grid">
                ${optionsHtml}
              </div>
              <button style="align-self: flex-start; margin-top: 8px; font-size: 12px; padding: 6px 12px;" onclick="addOption(${idx})">+ Add Option</button>
            </div>
            
            <div class="input-group">
              <label>Technical Explanation</label>
              <textarea oninput="updateQuestion(${idx}, 'explanation', this.value)">${escapeHtml(q.explanation || '')}</textarea>
            </div>
          `;
          container.appendChild(card);
      });
    }

    // --- Data Update Handlers ---
    
    function updateQuestion(qIdx, field, val) {
        jsonData[currentSelectedTopic][qIdx][field] = val;
    }
    
    function updateOption(qIdx, optIdx, val) {
        jsonData[currentSelectedTopic][qIdx].options[optIdx] = val;
    }
    
    function updateAnswer(qIdx, optIdx, isChecked, isMulti) {
        if (isMulti) {
            let ansArray = jsonData[currentSelectedTopic][qIdx].answer;
            if (!Array.isArray(ansArray)) ansArray = [ansArray]; // fallback
            
            if (isChecked) {
                if (!ansArray.includes(optIdx)) ansArray.push(optIdx);
            } else {
                ansArray = ansArray.filter(v => v !== optIdx);
            }
            // Sort array just to be clean
            ansArray.sort((a,b) => a-b);
            jsonData[currentSelectedTopic][qIdx].answer = ansArray;
        } else {
            jsonData[currentSelectedTopic][qIdx].answer = optIdx;
        }
    }
    
    function addOption(qIdx) {
        if (!jsonData[currentSelectedTopic][qIdx].options) {
            jsonData[currentSelectedTopic][qIdx].options = [];
        }
        jsonData[currentSelectedTopic][qIdx].options.push("New Option");
        renderQuestions();
    }
    
    function deleteQuestion(qIdx) {
        if(confirm("Are you sure you want to delete this question?")) {
            jsonData[currentSelectedTopic].splice(qIdx, 1);
            renderQuestions();
            renderSidebar(document.getElementById('search').value); // update Q count
        }
    }
    
    function addQuestion() {
        if (!currentSelectedTopic) return;
        
        jsonData[currentSelectedTopic].push({
            question: "New Question Text",
            options: ["Option A", "Option B", "Option C", "Option D"],
            answer: 0,
            explanation: "Explanation text goes here."
        });
        
        renderQuestions();
        renderSidebar(document.getElementById('search').value); // update Q count
        
        // Scroll to bottom
        setTimeout(() => {
            const container = document.getElementById('questions-container');
            container.scrollTop = container.scrollHeight;
        }, 100);
    }

    // --- Utilities ---

    function showToast(msg) {
      const toast = document.getElementById('toast');
      document.getElementById('toast-msg').textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
    
    function escapeHtml(unsafe) {
        if (typeof unsafe !== 'string') return unsafe;
        return unsafe
             .replace(/&/g, "&amp;")
             .replace(/</g, "&lt;")
             .replace(/>/g, "&gt;")
             .replace(/"/g, "&quot;")
             .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
